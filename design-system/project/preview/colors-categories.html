<!doctype html><html><head><meta charset="utf-8">
<style>
  :root{--plum:#531E38;--magenta:#9F2D6D;--orange:#FF7404;--cream:#EFEDEB;--ink:#1B1C1E;--stone:#A69E92;--red:#E81A1E;--mist:#D4D4D1}
  body{margin:0;padding:28px;background:var(--cream);font-family:'Inter Tight',system-ui,sans-serif;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .s{border-radius:14px;height:150px;padding:18px;display:flex;flex-direction:column;justify-content:space-between}
  .n{font-family:'Inter Tight';font-weight:600;font-size:14px;letter-spacing:-.01em}
  .h{font-family:'IBM Plex Mono';font-weight:500;font-size:12px;opacity:.9}
  .sub{font-family:'Inter Tight';font-size:11px;opacity:.75;margin-top:4px}
  .dark{color:var(--cream)}
  .light{color:var(--ink)}
</style></head><body>
  <div class="s dark" style="background:#531E38"><div><div class="n">Deep plum</div><div class="sub">Primary surface</div></div><div class="h">#531E38</div></div>
  <div class="s dark" style="background:#9F2D6D"><div><div class="n">Magenta</div><div class="sub">Accent / data</div></div><div class="h">#9F2D6D</div></div>
  <div class="s light" style="background:#FF7404"><div><div class="n">Vivid orange</div><div class="sub">CTA / focus</div></div><div class="h">#FF7404</div></div>
  <div class="s light" style="background:#EFEDEB;border:1px solid #D4D4D1"><div><div class="n">Cream</div><div class="sub">Page / text-on-dark</div></div><div class="h">#EFEDEB</div></div>
</body></html>
