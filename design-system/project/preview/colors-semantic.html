<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:34px;background:var(--me-cream);display:flex;flex-direction:column;gap:12px}
  .row{display:grid;grid-template-columns:160px 1fr 100px;gap:18px;align-items:center}
  .chip{height:32px;border-radius:8px;border:1px solid rgba(27,28,30,.08)}
  .label{font-family:var(--me-font-body);font-weight:500;font-size:14px;color:var(--me-ink)}
  .hex{font-family:var(--me-font-display);font-weight:500;font-size:12px;color:var(--me-stone);text-align:right}
</style></head><body>
  <div class="row"><div class="label">Accent / CTA</div><div class="chip" style="background:#FF7404"></div><div class="hex">#FF7404</div></div>
  <div class="row"><div class="label">Highlight / data</div><div class="chip" style="background:#9F2D6D"></div><div class="hex">#9F2D6D</div></div>
  <div class="row"><div class="label">Danger / loss</div><div class="chip" style="background:#E81A1E"></div><div class="hex">#E81A1E</div></div>
  <div class="row"><div class="label">Brand surface</div><div class="chip" style="background:#531E38"></div><div class="hex">#531E38</div></div>
  <div class="row"><div class="label">Muted text</div><div class="chip" style="background:#A69E92"></div><div class="hex">#A69E92</div></div>
</body></html>
