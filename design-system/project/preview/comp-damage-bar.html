<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:36px;background:var(--me-cream);display:flex;flex-direction:column;gap:24px}
  .card{background:#fff;border:1px solid #D4D4D1;border-radius:14px;padding:22px}
  .eyebrow{font-family:'IBM Plex Mono';font-weight:500;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#A69E92;margin-bottom:4px;display:flex;justify-content:space-between}
  .val{font-family:'IBM Plex Mono';font-weight:600;font-size:15px;color:#1B1C1E;letter-spacing:-.02em}
  .track{height:10px;background:#F2EEEA;border-radius:999px;overflow:hidden;position:relative}
  .fill{height:100%;border-radius:999px;transition:width .3s}
  .ok .fill{background:linear-gradient(90deg,#531E38 0%,#9F2D6D 100%)}
  .crit .fill{background:linear-gradient(90deg,#9F2D6D 0%,#E81A1E 100%)}
</style></head><body>
  <div class="card ok">
    <div class="eyebrow"><span>Damage · stabilné</span><span class="val">42%</span></div>
    <div class="track" style="margin-top:8px"><div class="fill" style="width:42%"></div></div>
  </div>
  <div class="card crit">
    <div class="eyebrow"><span>Damage · kritické</span><span class="val">88%</span></div>
    <div class="track" style="margin-top:8px"><div class="fill" style="width:88%"></div></div>
  </div>
</body></html>
