<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:28px;background:var(--me-cream);display:flex;flex-direction:column;gap:8px}
  .row{display:flex;align-items:center;background:#fff;border:1px solid #D4D4D1;border-radius:14px;padding:14px 18px;gap:16px;position:relative;overflow:hidden}
  .row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
  .mkt::before{background:#9F2D6D}
  .fin::before{background:#E81A1E}
  .ops::before{background:#FF7404}
  .gen::before{background:#A69E92}
  .badge{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono';font-weight:600;font-size:11px;color:#EFEDEB;flex-shrink:0}
  .main{flex:1;min-width:0}
  .label{font-family:'Inter Tight';font-weight:600;font-size:15px;color:#1B1C1E}
  .desc{font-family:'Inter Tight';font-size:13px;color:#6b635a;margin-top:2px}
  .price{text-align:right}
  .price .n{font-family:'IBM Plex Mono';font-weight:600;font-size:17px;color:#1B1C1E;letter-spacing:-.02em}
  .price .m{font-family:'Inter Tight';font-size:11px;color:#A69E92;margin-top:2px}
  .btn{background:#FF7404;color:#EFEDEB;font-family:'Inter Tight';font-weight:600;font-size:13px;padding:9px 16px;border-radius:999px;border:none;cursor:pointer;margin-left:12px}
  .unafford{opacity:.5}
  .unafford .btn{background:#D4D4D1;color:#A69E92}
</style></head><body>
  <div class="row mkt"><div class="badge" style="background:#9F2D6D">MKT</div><div class="main"><div class="label">Marketingový špecialista</div><div class="desc">Buduje značku, prináša zákazníkov.</div></div><div class="price"><div class="n">€140</div><div class="m">+€70k/mes</div></div><button class="btn">Najať</button></div>
  <div class="row fin"><div class="badge" style="background:#E81A1E">ACC</div><div class="main"><div class="label">Účtovník</div><div class="desc">Kontroluje faktúry, dane, cashflow.</div></div><div class="price"><div class="n">€100</div><div class="m">+€50k/mes</div></div><button class="btn">Najať</button></div>
  <div class="row ops"><div class="badge" style="background:#FF7404">OPS</div><div class="main"><div class="label">Operations Manager</div><div class="desc">Nastavuje procesy, rieši logistiku.</div></div><div class="price"><div class="n">€160</div><div class="m">+€80k/mes</div></div><button class="btn">Najať</button></div>
  <div class="row gen unafford"><div class="badge" style="background:#A69E92">VA</div><div class="main"><div class="label">Virtuálna asistentka</div><div class="desc">Pomalšia, ale flexibilná.</div></div><div class="price"><div class="n">€60</div><div class="m">+€30k/mes</div></div><button class="btn">Nedostupné</button></div>
</body></html>
