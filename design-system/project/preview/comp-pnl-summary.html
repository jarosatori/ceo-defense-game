<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:32px;background:var(--me-cream)}
  .pnl{background:#531E38;border-radius:18px;padding:22px 26px;display:grid;grid-template-columns:repeat(4,1fr);gap:2px;color:#EFEDEB;position:relative}
  .col{padding:6px 14px;border-right:1px solid rgba(239,237,235,.12)}
  .col:last-child{border-right:none}
  .k{font-family:'IBM Plex Mono';font-weight:500;font-size:10px;letter-spacing:.16em;text-transform:uppercase;opacity:.6;margin-bottom:6px}
  .v{font-family:'IBM Plex Mono';font-weight:600;font-size:24px;letter-spacing:-.02em}
  .orange{color:#FF7404}
  .magenta{color:#FF9DC8}
</style></head><body>
  <div class="pnl">
    <div class="col"><div class="k">Obrat</div><div class="v orange">€127k</div></div>
    <div class="col"><div class="k">Zisk</div><div class="v magenta">+€42k</div></div>
    <div class="col"><div class="k">Tím</div><div class="v">3</div></div>
    <div class="col"><div class="k">Náklady</div><div class="v" style="color:#EFEDEB;opacity:.85">€85k</div></div>
  </div>
</body></html>
