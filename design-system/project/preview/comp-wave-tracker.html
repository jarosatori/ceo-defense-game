<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:36px;background:var(--me-cream);display:flex;flex-direction:column;gap:14px}
  .head{display:flex;justify-content:space-between;align-items:baseline}
  .eyebrow{font-family:'IBM Plex Mono';font-weight:500;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#A69E92}
  .val{font-family:'IBM Plex Mono';font-weight:600;font-size:14px;color:#531E38;letter-spacing:-.01em}
  .row{display:flex;gap:6px;flex-wrap:wrap}
  .chip{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono';font-weight:600;font-size:13px}
  .done{background:#531E38;color:#EFEDEB}
  .current{background:#FF7404;color:#EFEDEB;box-shadow:0 0 0 3px rgba(255,116,4,.2)}
  .todo{background:#fff;color:#A69E92;border:1px solid #D4D4D1}
</style></head><body>
  <div class="head">
    <div class="eyebrow">Prežil som</div>
    <div class="val">4 / 10 vĺn</div>
  </div>
  <div class="row">
    <div class="chip done">1</div><div class="chip done">2</div><div class="chip done">3</div><div class="chip done">4</div>
    <div class="chip current">5</div>
    <div class="chip todo">6</div><div class="chip todo">7</div><div class="chip todo">8</div><div class="chip todo">9</div><div class="chip todo">10</div>
  </div>
</body></html>
