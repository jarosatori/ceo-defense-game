<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:36px 40px;background:var(--me-cream);display:flex;flex-direction:column;gap:22px}
  .eyebrow{font-family:'IBM Plex Mono';font-weight:500;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#A69E92}
  .og{font-family:'IBM Plex Mono';font-weight:600;font-size:36px;letter-spacing:.04em;color:#531E38}
  .cap{font-family:'Inter Tight';font-weight:600;font-size:13px;letter-spacing:.02em}
  .pill{display:inline-block;padding:10px 18px;background:#FF7404;border-radius:999px;color:#EFEDEB;margin-right:8px}
  .pill.ghost{background:transparent;color:#531E38;border:1px solid #531E38}
</style></head><body>
  <div class="eyebrow">Co ta zabilo</div>
  <div class="eyebrow">Najmi do timu</div>
  <div class="eyebrow">Tvoj tim</div>
  <div class="og">CEO DEFENSE</div>
  <div>
    <span class="pill"><span class="cap">Hrať →</span></span>
    <span class="pill ghost"><span class="cap">Pokračovať</span></span>
  </div>
</body></html>
